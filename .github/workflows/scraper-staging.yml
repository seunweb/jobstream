name: JobStream Scraper (Staging)

# Scraper for staging environment — runs less frequently, writes to staging DB

on:
  schedule:
    - cron: '0 */12 * * *'   # Every 12 hours (half as often as prod)

  workflow_dispatch:
    inputs:
      company_url:
        description: 'Scrape a single company URL (leave empty for all)'
        required: false
        default: ''
      force_rescrape:
        description: 'Force rescrape (ignore 24h cache)'
        required: false
        default: 'false'
        type: boolean

jobs:
  scrape:
    name: Scrape → Staging DB
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'scraper/requirements.txt'

      - name: Install dependencies
        run: |
          cd scraper
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          cd scraper
          playwright install chromium --with-deps
        continue-on-error: true

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}   # staging DB
          SECRET_KEY: ${{ secrets.SECRET_KEY_STAGING }}
          COMPANY_URL: ${{ github.event.inputs.company_url }}
          FORCE_RESCRAPE: ${{ github.event.inputs.force_rescrape }}
          ENVIRONMENT: staging
        run: |
          cd scraper
          python run_scraper.py

      - name: Report results
        if: always()
        run: echo "Staging scraper run completed at $(date -u)"

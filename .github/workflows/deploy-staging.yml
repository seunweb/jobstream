name: Deploy to Staging

# Triggers on every push to the staging branch
on:
  push:
    branches:
      - staging

  # Allow manual trigger
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy staging → Railway
    runs-on: ubuntu-latest
    environment: staging          # uses GitHub Environment secrets

    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway (staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          cd scraper
          railway up --service jobstream-backend-staging --detach

      - name: Deploy frontend to Railway (staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          railway up --service jobstream-frontend-staging --detach

      - name: Post deploy comment
        if: always()
        run: |
          echo "Staging deploy triggered at $(date -u)"
          echo "Backend:  https://jobstream-staging-backend.up.railway.app"
          echo "Frontend: https://jobstream-staging-frontend.up.railway.app"

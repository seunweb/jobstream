name: Deploy to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy staging → Railway
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway (staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          cd scraper
          railway up --service jobstream-staging --detach

      - name: Deploy frontend to Railway (staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          railway up --service practical-creativity-staging --detach

      - name: Post deploy notification
        if: always()
        run: |
          echo "Staging deploy triggered at $(date -u)"
          echo "Backend:  https://jobstream-staging.up.railway.app"
          echo "Frontend: https://practical-creativity-staging-9713.up.railway.app"

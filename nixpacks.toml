[phases.setup]
nixPkgs = ["nodejs_20", "python312"]

[phases.install]
cmds = [
  "npm install",
  "pip install -r scraper/requirements.txt"
]

[phases.build]
cmds = [
  "npm run build",
  "echo 'Frontend built into dist/'"
]

[start]
cmd = "cd scraper && uvicorn main:app --host 0.0.0.0 --port $PORT --loop asyncio"

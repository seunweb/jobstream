name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy main → Railway (Production)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway (production)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
        run: |
          cd scraper
          railway up --service jobstream --detach

      - name: Deploy frontend to Railway (production)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
        run: |
          railway up --service practical-creativity --detach

      - name: Post deploy notification
        if: always()
        run: |
          echo "Production deploy triggered at $(date -u)"
          echo "Backend:  https://jobstream-production-088c.up.railway.app"
          echo "Frontend: https://practical-creativity-production-2972.up.railway.app"
